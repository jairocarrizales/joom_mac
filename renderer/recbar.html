<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <link rel="stylesheet" href="styles.css" />
  <title>Grabación</title>
</head>
<body class="bar">
  <div class="bar-inner" id="inner">
    <span class="rb-rec"><span class="rb-dot"></span><span id="time">00:00</span></span>
    <button id="pause" class="tool" title="Pausar (Ctrl+Shift+P)">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" stroke="none"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
    <button id="stop" class="tool rb-stop" title="Detener (Ctrl+Shift+R)">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" stroke="none"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
    </button>
    <button id="raise" class="tool" title="Traer cámara al frente">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="14" height="14" rx="2"/><path d="M10 16V9m0 0-3 3m3-3 3 3"/></svg>
    </button>
    <button id="ytback" class="tool hidden" title="Regresar 10s el video">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" stroke="none"><path d="M11 5v14l-9-7z"/><path d="M22 5v14l-9-7z"/></svg>
    </button>
    <button id="ytbtn" class="tool hidden" title="Pausar/Reanudar el video">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" stroke="none"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
    <button id="slprev" class="tool hidden" title="Diapositiva anterior">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button id="slnext" class="tool hidden" title="Diapositiva siguiente">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
    <button id="szless" class="tool hidden" title="Alejar pantalla">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button id="szmore" class="tool hidden" title="Acercar pantalla (resaltar detalle)">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <span class="sep"></span>
    <button id="annToggle" class="tool" title="Anotaciones (Ctrl+Shift+A)">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </button>

    <div id="annTools" class="ann-tools hidden">
      <span class="sep"></span>
      <button class="tool atool" data-tool="laser" title="Láser (clic para activar/desactivar)">⦿</button>
      <button class="tool atool" data-tool="rect" title="Rectángulo">▭</button>
      <button class="tool atool" data-tool="arrow" title="Flecha">➜</button>
      <button class="tool atool" data-tool="number" title="Números">①</button>
      <button id="confetti" class="tool" title="Confeti 🎉">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" stroke="none"><path d="M11 2l1.7 4.5L17 8.2l-4.3 1.7L11 14.4 9.3 9.9 5 8.2l4.3-1.7z"/><path d="M18 13l1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/></svg>
      </button>
      <span class="sep"></span>
      <button class="thick active" data-w="4" title="Línea fina"><i style="height:2px"></i></button>
      <button class="thick" data-w="9" title="Línea gruesa"><i style="height:5px"></i></button>
      <span class="sep"></span>
      <button class="sw active" data-color="#ff3b30" style="background:#ff3b30"></button>
      <button class="sw" data-color="#ffcc00" style="background:#ffcc00"></button>
      <button class="sw" data-color="#34c759" style="background:#34c759"></button>
      <button class="sw" data-color="#0a84ff" style="background:#0a84ff"></button>
      <button class="sw" data-color="#ffffff" style="background:#ffffff"></button>
      <span class="sep"></span>
      <button id="clear" class="tool" title="Borrar todo">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>
    </div>
  </div>
  <script src="recbar.js"></script>
</body>
</html>
